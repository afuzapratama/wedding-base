<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#FDF8F3">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>Generator Link Tamu - Afuza & Mutiara</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Montserrat:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    :root {
      --gold: #B08968;
      --gold-light: #D4C4A8;
      --gold-dark: #8B6F50;
      --cream: #FDF8F3;
      --cream-dark: #F0E6DA;
      --dark: #5B4A3F;
      --white: #FFFFFF;
      --radius: 14px;
      --shadow: 0 2px 16px rgba(176, 137, 104, 0.08);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    html { font-size: 16px; }

    body {
      font-family: 'Montserrat', 'Segoe UI', system-ui, sans-serif;
      background: var(--cream);
      color: var(--dark);
      min-height: 100dvh;
      -webkit-font-smoothing: antialiased;
    }

    /* ===== HEADER ===== */
    .header {
      position: sticky;
      top: 0;
      z-index: 50;
      background: rgba(253, 248, 243, 0.92);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      padding: 16px 20px;
      border-bottom: 1px solid rgba(176, 137, 104, 0.12);
      text-align: center;
    }

    .header h1 {
      font-family: 'Playfair Display', serif;
      font-size: 1.15rem;
      color: var(--gold);
      font-weight: 600;
      letter-spacing: 0.5px;
    }

    .header p {
      font-size: 0.72rem;
      color: var(--gold-light);
      margin-top: 2px;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    /* ===== CONTAINER ===== */
    .container {
      max-width: 540px;
      margin: 0 auto;
      padding: 16px 16px calc(16px + var(--safe-bottom));
    }

    /* ===== CARDS ===== */
    .card {
      background: var(--white);
      border: 1px solid rgba(176, 137, 104, 0.15);
      border-radius: var(--radius);
      padding: 20px;
      margin-bottom: 14px;
      box-shadow: var(--shadow);
    }

    .card-title {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--gold);
      margin-bottom: 14px;
    }

    .card-title .emoji { font-size: 1.1rem; }

    /* ===== DOMAIN INPUT ===== */
    .domain-group {
      display: flex;
      align-items: center;
      gap: 0;
      border: 1px solid rgba(176, 137, 104, 0.25);
      border-radius: 10px;
      overflow: hidden;
      background: var(--cream);
    }

    .domain-group .prefix {
      padding: 12px 12px;
      font-size: 0.75rem;
      color: var(--gold);
      font-weight: 600;
      white-space: nowrap;
      background: rgba(176, 137, 104, 0.06);
      border-right: 1px solid rgba(176, 137, 104, 0.15);
    }

    .domain-group input {
      flex: 1;
      border: none;
      background: transparent;
      padding: 12px;
      font-size: 0.85rem;
      color: var(--dark);
      outline: none;
      min-width: 0;
      font-family: inherit;
    }

    /* ===== INPUTS ===== */
    label {
      display: block;
      font-size: 0.75rem;
      color: var(--gold);
      font-weight: 600;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    input, textarea {
      width: 100%;
      padding: 14px 16px;
      border: 1px solid rgba(176, 137, 104, 0.25);
      border-radius: 10px;
      background: var(--cream);
      color: var(--dark);
      font-family: inherit;
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    input:focus, textarea:focus {
      border-color: var(--gold);
      box-shadow: 0 0 0 3px rgba(176, 137, 104, 0.1);
    }

    input::placeholder, textarea::placeholder {
      color: rgba(91, 74, 63, 0.35);
    }

    textarea {
      resize: vertical;
      min-height: 130px;
      font-size: 0.85rem;
      line-height: 1.9;
    }

    /* ===== SINGLE ADD ===== */
    .add-row {
      display: flex;
      gap: 10px;
    }

    .add-row input { flex: 1; min-width: 0; }

    .add-row .btn-add {
      flex-shrink: 0;
      width: 48px;
      height: 48px;
      border-radius: 12px;
      border: none;
      background: linear-gradient(135deg, var(--gold), var(--gold-dark));
      color: var(--white);
      font-size: 1.4rem;
      font-weight: 300;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
      box-shadow: 0 3px 12px rgba(176, 137, 104, 0.3);
    }

    .add-row .btn-add:active { transform: scale(0.95); }

    /* ===== BUTTONS ===== */
    button {
      border: none;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.15s;
    }

    button:active { transform: scale(0.97); }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 13px 20px;
      border-radius: 10px;
      font-size: 0.82rem;
      font-weight: 600;
      letter-spacing: 0.3px;
      width: 100%;
    }

    .btn-gold {
      background: linear-gradient(135deg, var(--gold), var(--gold-dark));
      color: var(--white);
      box-shadow: 0 3px 12px rgba(176, 137, 104, 0.25);
    }

    .btn-gold:active { box-shadow: 0 1px 4px rgba(176, 137, 104, 0.2); }

    .btn-outline {
      background: transparent;
      color: var(--gold);
      border: 1.5px solid rgba(176, 137, 104, 0.3);
    }

    .btn-outline:active { background: rgba(176, 137, 104, 0.05); }

    .btn-danger {
      background: transparent;
      color: #C0816A;
      border: 1.5px solid rgba(192, 129, 106, 0.25);
    }

    .btn-danger:active { background: rgba(192, 129, 106, 0.05); }

    /* ===== RESULT ITEMS ===== */
    .result-empty {
      text-align: center;
      padding: 32px 16px;
      color: rgba(91, 74, 63, 0.35);
      font-size: 0.85rem;
    }

    .result-empty .empty-icon {
      font-size: 2rem;
      margin-bottom: 8px;
      opacity: 0.5;
    }

    .result-item {
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding: 14px 16px;
      background: var(--cream);
      border: 1px solid rgba(176, 137, 104, 0.12);
      border-radius: 12px;
      margin-bottom: 10px;
    }

    .result-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .result-name {
      font-weight: 600;
      color: var(--dark);
      font-size: 0.88rem;
      flex: 1;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .result-actions {
      display: flex;
      gap: 6px;
      flex-shrink: 0;
    }

    .result-link {
      font-size: 0.72rem;
      color: var(--gold);
      word-break: break-all;
      line-height: 1.4;
      opacity: 0.7;
    }

    .btn-xs {
      padding: 7px 14px;
      border-radius: 8px;
      font-size: 0.72rem;
      font-weight: 600;
      border: none;
    }

    .btn-copy {
      background: var(--gold);
      color: var(--white);
    }

    .btn-copy.copied { background: #5C8A5E; }

    .btn-remove {
      background: rgba(176, 137, 104, 0.1);
      color: var(--gold-dark);
      font-size: 0.8rem;
    }

    /* ===== ACTION GRID ===== */
    .action-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 16px;
    }

    .action-grid .full-span { grid-column: 1 / -1; }

    .btn-wa {
      background: #25D366;
      color: var(--white);
    }

    .btn-wa-formal {
      background: #128C7E;
      color: var(--white);
    }

    /* ===== COUNT BADGE ===== */
    .count-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 4px 12px;
      background: rgba(176, 137, 104, 0.08);
      border-radius: 20px;
      font-size: 0.72rem;
      font-weight: 600;
      color: var(--gold);
      margin-bottom: 12px;
    }

    .hint {
      font-size: 0.72rem;
      color: rgba(91, 74, 63, 0.45);
      margin-top: 8px;
      line-height: 1.5;
    }

    /* ===== TOAST ===== */
    .toast {
      position: fixed;
      bottom: calc(24px + var(--safe-bottom));
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: var(--dark);
      color: var(--white);
      padding: 12px 24px;
      border-radius: 12px;
      font-size: 0.82rem;
      font-weight: 500;
      box-shadow: 0 8px 32px rgba(0,0,0,0.15);
      z-index: 999;
      opacity: 0;
      transition: transform 0.3s ease, opacity 0.3s ease;
      pointer-events: none;
      max-width: calc(100vw - 40px);
      text-align: center;
    }

    .toast.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }

    /* ===== SCROLLBAR ===== */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(176, 137, 104, 0.2); border-radius: 4px; }

    /* ===== DESKTOP ENHANCE ===== */
    @media (min-width: 640px) {
      .container { padding: 24px; }
      .card { padding: 28px; }
      .header { padding: 20px 24px; }
      .header h1 { font-size: 1.3rem; }
    }
  </style>
</head>
<body>

  <div class="header">
    <h1>Generator Link Tamu</h1>
    <p>Afuza & Mutiara</p>
  </div>

  <div class="container">

    <!-- Domain -->
    <div class="card">
      <div class="card-title"><span class="emoji">🌐</span> Domain Website</div>
      <div class="domain-group">
        <span class="prefix">URL</span>
        <input type="text" id="domain" value="https://afuzamutiara.my.id" placeholder="https://domain.com">
      </div>
      <p class="hint">Ganti sesuai domain website undangan kamu</p>
    </div>

    <!-- Single Guest -->
    <div class="card">
      <div class="card-title"><span class="emoji">👤</span> Tambah Tamu</div>
      <div class="add-row">
        <input type="text" id="singleName" placeholder="Ketik nama tamu..." onkeydown="if(event.key==='Enter')addSingle()">
        <button class="btn-add" onclick="addSingle()" aria-label="Tambah tamu">+</button>
      </div>
    </div>

    <!-- Bulk Guest -->
    <div class="card">
      <div class="card-title"><span class="emoji">📋</span> Tambah Banyak Sekaligus</div>
      <label>Satu nama per baris</label>
      <textarea id="bulkNames" placeholder="Anugra Bakti Nasution&#10;Budi Santoso&#10;Keluarga Pak Ahmad&#10;Ibu Sari dan Keluarga"></textarea>
      <div style="margin-top: 14px;">
        <button class="btn btn-gold" onclick="addBulk()">✨ Generate Semua</button>
      </div>
    </div>

    <!-- Results -->
    <div class="card">
      <div class="card-title"><span class="emoji">📎</span> Daftar Link Tamu</div>
      <div id="countBadge"></div>
      <div id="resultList"></div>
      <div id="actionButtons" style="display:none;">
        <div class="action-grid">
          <button class="btn btn-outline" onclick="copyAll()">📋 Copy Semua</button>
          <button class="btn btn-danger" onclick="clearAll()">🗑 Hapus Semua</button>
          <div class="full-span">
            <button class="btn btn-wa" onclick="copyAllChat()">💬 WA Mempelai</button>
          </div>
          <div class="full-span">
            <button class="btn btn-wa-formal" onclick="copyAllChatOrtu()">💬 WA Orang Tua</button>
          </div>
        </div>
      </div>
    </div>

  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <script>
    let guests = JSON.parse(localStorage.getItem('weddingGuests') || '[]')

    function getDomain() {
      return document.getElementById('domain').value.replace(/\/+$/, '')
    }

    function makeLink(name) {
      return `${getDomain()}/?to=${encodeURIComponent(name)}`
    }

    function saveGuests() {
      localStorage.setItem('weddingGuests', JSON.stringify(guests))
    }

    function showToast(msg) {
      const t = document.getElementById('toast')
      t.textContent = msg
      t.classList.add('show')
      setTimeout(() => t.classList.remove('show'), 2500)
    }

    function addGuest(name) {
      name = name.trim()
      if (!name) return false
      if (guests.find(g => g.toLowerCase() === name.toLowerCase())) {
        showToast(`"${name}" sudah ada di daftar`)
        return false
      }
      guests.push(name)
      saveGuests()
      render()
      return true
    }

    function addSingle() {
      const input = document.getElementById('singleName')
      const added = addGuest(input.value)
      if (added) {
        showToast('✓ Tamu ditambahkan')
        input.value = ''
      }
      input.focus()
    }

    function addBulk() {
      const textarea = document.getElementById('bulkNames')
      const names = textarea.value.split('\n').map(n => n.trim()).filter(n => n)
      if (names.length === 0) return
      let count = 0
      names.forEach(n => { if (addGuest(n)) count++ })
      textarea.value = ''
      showToast(`✓ ${count} tamu berhasil ditambahkan`)
    }

    function removeGuest(index) {
      guests.splice(index, 1)
      saveGuests()
      render()
    }

    function render() {
      const list = document.getElementById('resultList')
      const badge = document.getElementById('countBadge')
      const actions = document.getElementById('actionButtons')

      if (guests.length === 0) {
        badge.innerHTML = ''
        actions.style.display = 'none'
        list.innerHTML = '<div class="result-empty"><div class="empty-icon">📭</div><div>Belum ada tamu.<br>Tambahkan nama di atas.</div></div>'
        return
      }

      badge.innerHTML = '<span class="count-badge">👥 ' + guests.length + ' tamu</span>'
      actions.style.display = 'block'

      list.innerHTML = guests.map((name, i) => 
        '<div class="result-item">' +
          '<div class="result-top">' +
            '<span class="result-name">' + name + '</span>' +
            '<div class="result-actions">' +
              '<button class="btn-xs btn-copy" onclick="copyOne(this, ' + i + ')">Copy</button>' +
              '<button class="btn-xs btn-remove" onclick="removeGuest(' + i + ')">✕</button>' +
            '</div>' +
          '</div>' +
          '<div class="result-link">' + makeLink(name) + '</div>' +
        '</div>'
      ).join('')
    }

    function copyOne(btn, index) {
      navigator.clipboard.writeText(makeLink(guests[index]))
      btn.textContent = '✓'
      btn.classList.add('copied')
      setTimeout(() => {
        btn.textContent = 'Copy'
        btn.classList.remove('copied')
      }, 1500)
    }

    function copyAll() {
      const text = guests.map(name => name + ': ' + makeLink(name)).join('\n')
      navigator.clipboard.writeText(text)
      showToast('📋 ' + guests.length + ' link berhasil di-copy!')
    }

    function copyAllChat() {
      const text = guests.map(name => {
        return '\u0628\u0650\u0633\u0652\u0645\u0650 \u0627\u0644\u0644\u0651\u064E\u0647\u0650 \u0627\u0644\u0631\u0651\u064E\u062D\u0652\u0645\u064E\u0646\u0650 \u0627\u0644\u0631\u0651\u064E\u062D\u0650\u064A\u0645\u0650\n\nAssalamu\'alaikum Wr. Wb.\n\nKepada Yth.\nBapak/Ibu/Saudara/i\n*' + name + '*\n\nTanpa mengurangi rasa hormat, perkenankan kami mengundang Bapak/Ibu/Saudara/i untuk menghadiri acara pernikahan kami:\n\n  *Afuza Pratama, S.Kom*\n        &\n    *Mutiara Erwina*\n\n\uD83D\uDCC5 Sabtu, 04 April 2026\n\uD83D\uDCCD Jl. Andan Sari Durung III, Lingkungan 7, Kel. Terjun\n\nMerupakan suatu kebahagiaan bagi kami apabila Bapak/Ibu/Saudara/i berkenan hadir untuk memberikan doa restu.\n\nSilakan buka undangan digital kami:\n\uD83D\uDD17 ' + makeLink(name) + '\n\nAtas kehadiran dan doa restunya, kami ucapkan terima kasih.\n\nWassalamu\'alaikum Wr. Wb.\n_Afuza & Mutiara_ \uD83D\uDC95'
      }).join('\n\n\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\n\n')
      navigator.clipboard.writeText(text)
      showToast('\uD83D\uDCAC ' + guests.length + ' undangan WA mempelai di-copy!')
    }

    function copyAllChatOrtu() {
      const text = guests.map(name => {
        return '\u0628\u0650\u0633\u0652\u0645\u0650 \u0627\u0644\u0644\u0651\u064E\u0647\u0650 \u0627\u0644\u0631\u0651\u064E\u062D\u0652\u0645\u064E\u0646\u0650 \u0627\u0644\u0631\u0651\u064E\u062D\u0650\u064A\u0645\u0650\n\nAssalamu\'alaikum Wr. Wb.\n\nKepada Yth.\nBapak/Ibu/Saudara/i\n*' + name + '*\n\nDengan memohon rahmat dan ridho Allah SWT, kami bermaksud mengundang Bapak/Ibu/Saudara/i untuk menghadiri acara pernikahan putra-putri kami:\n\n*Afuza Pratama, S.Kom*\n_Putra dari Alm. Bpk Iwan & Ibu Nurzannah_\n\n        &\n\n*Mutiara Erwina*\n_Putri dari Bpk Eriwin & Ibu Darliana/Lina_\n\nyang InsyaAllah akan dilaksanakan pada:\n\n\uD83D\uDD4C *Akad Nikah*\n\uD83D\uDCC5 Sabtu, 04 April 2026\n\uD83D\uDD58 09:00 - 10:00 WIB\n\n\uD83C\uDF89 *Resepsi*\n\uD83D\uDCC5 Sabtu, 04 April 2026\n\uD83D\uDD59 10:00 WIB - Selesai\n\n\uD83D\uDCCD Jl. Andan Sari Durung III, Lingkungan 7, Kel. Terjun\n\nMerupakan suatu kehormatan dan kebahagiaan bagi keluarga kami apabila Bapak/Ibu/Saudara/i berkenan hadir untuk memberikan doa restu kepada kedua mempelai.\n\nSilakan buka undangan digital di:\n\uD83D\uDD17 ' + makeLink(name) + '\n\nAtas kehadiran dan doa restunya, kami mengucapkan terima kasih.\n\nWassalamu\'alaikum Wr. Wb.\n\n_Keluarga Besar Kedua Mempelai_ \uD83D\uDE4F'
      }).join('\n\n\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\n\n')
      navigator.clipboard.writeText(text)
      showToast('\uD83D\uDCAC ' + guests.length + ' undangan WA orang tua di-copy!')
    }

    function clearAll() {
      if (confirm('Hapus semua tamu?')) {
        guests = []
        saveGuests()
        render()
        showToast('\uD83D\uDDD1 Semua tamu dihapus')
      }
    }

    // Init
    render()
  </script>
</body>
</html>
